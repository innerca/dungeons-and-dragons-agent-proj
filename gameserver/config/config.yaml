server:
  grpc_port: 50051

# ─── Database & Cache ───
database:
  pg_min_size: 2
  pg_max_size: 10
  pg_command_timeout: 30

redis:
  max_connections: 20
  key_prefix: "sao"                     # Redis key namespace: {prefix}:player:xxx

cache:
  auth_token_ttl: 86400                 # 24h
  state_ttl: 7200                       # 2h
  history_ttl: 14400                    # 4h
  summary_ttl: 14400                    # 4h
  max_stored_messages: 50               # Redis LTRIM cap

llm:
  default_provider: "deepseek"
  providers:
    deepseek:
      api_key: "${DEEPSEEK_API_KEY}"
      base_url: "https://api.deepseek.com"
      model: "deepseek-chat"
      max_tokens: 2048
      temperature: 0.7
      provider_type: "openai"
    openai:
      api_key: "${OPENAI_API_KEY}"
      base_url: "https://api.openai.com/v1"
      model: "gpt-4"
      max_tokens: 2048
      temperature: 0.7
      provider_type: "openai"
    anthropic:
      api_key: "${ANTHROPIC_API_KEY}"
      model: "claude-3-sonnet-20240229"
      max_tokens: 2048
      provider_type: "anthropic"

# ─── Game Configuration ───
game:
  # Token budget per request (~4700 total)
  token_budget:
    system_prompt: 800
    tool_definitions: 500
    player_state: 200
    summary: 300
    rag_chunks: 800
    chat_history: 2000
    user_input: 100

  # Context assembly
  context:
    max_history_messages: 20
    max_rag_chunks: 5
    history_compression_threshold: 40
    history_trim_to: 30
    summary_max_chars: 600

  # Combat
  combat:
    combat_state_ttl_seconds: 1800      # 30 minutes
    max_react_rounds: 5
    counter_attack_enabled: true
    critical_weak_base: 0.05            # 5% base weak-point crit chance
    critical_weak_per_accuracy: 0.02    # +2% per accuracy bonus
    critical_true_base: 0.01            # 1% base true crit
    critical_true_luk_divisor: 200      # +LUK/200
    defense_reduction_factor: 0.6       # defense * factor subtracted from damage
    damage_variance_min: 0.9
    damage_variance_max: 1.1
    str_scaling_divisor: 100            # base_dmg * (1 + STR / divisor)
    bare_hands_atk: 10
    crit_multiplier: 1.5
    flee_dc: 12                         # d20+AGI >= dc to flee
    generic_monster:                     # fallback when monster not in DB
      hp: 100
      atk: 15
      defense: 5
      ac: 10

  # Leveling
  leveling:
    exp_formula_base: 100               # exp_to_next = base * level^exponent
    exp_formula_exponent: 1.5
    stat_points_per_level: 3
    base_hp: 200
    hp_per_level: 50
    hp_per_vit: 10

  # Economy
  economy:
    starting_col: 500
    npc_buy_rate: 0.5                   # NPC pays 50% of base_price
    potion_heal_amount: 100

  # Encounter (random enemy in the wild)
  encounter:
    rate: 0.25                          # 25% chance per move
    max_count: 3                        # 1~N enemies per encounter
    safe_areas:
      - 起始之城
      - 城镇
      - 旅馆
      - 商店
      - 广场
      - 转移门
      - 酒馆

  # Teleport / floor map
  floor:
    max_floor: 7
    floor_areas:
      1: "起始之城"
      2: "乌尔巴斯"
      3: "兹姆福特"
      4: "罗毕亚"
      5: "卡尔路因"
      6: "史塔基翁"
      7: "窝鲁布达"

  # Rest & recovery
  rest:
    short_rest_recovery_rate: 0.25      # recover 25% of max_hp

  # NPC relationship system
  relationship:
    min_level: -100
    max_level: 100
    tiers:
      - { min: 80,  label: "挚友" }
      - { min: 50,  label: "亲密" }
      - { min: 20,  label: "友好" }
      - { min: 0,   label: "中立" }
      - { min: -30, label: "冷淡" }
      - { min: -60, label: "敌对" }
      - { min: -100, label: "仇恨" }

  # Scene detection keywords (for dynamic context pruning)
  scene_keywords:
    combat:
      - 攻击
      - 战斗
      - 剑技
      - 防御
      - 逃跑
      - 怪物
      - BOSS
      - HP
    exploration:
      - 移动
      - 前往
      - 探索
      - 进入
      - 走
      - 迷宫
    social:
      - 对话
      - 说
      - 问
      - NPC
      - 购买
      - 出售
      - 交易
      - 情报
    rest:
      - 休息
      - 回复
      - 旅馆
      - 睡觉
