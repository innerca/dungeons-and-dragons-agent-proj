server:
  port: 8080
  read_timeout: 30s
  write_timeout: 120s

gameserver:
  address: "localhost:50051"
  timeout: 60s

sse:
  timeout: 120s

redis:
  auth_key_prefix: "sao:auth:token:"

cors:
  allowed_origins:
    - "http://localhost:5173"
  allowed_methods:
    - "GET"
    - "POST"
    - "OPTIONS"

logging:
  level: "info"
