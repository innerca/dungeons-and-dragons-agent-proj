services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sao_game
      POSTGRES_USER: sao
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sao_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./gameserver/scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./gameserver/scripts/migrations/v0500_schema.sql:/docker-entrypoint-initdb.d/02-v0500.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sao -d sao_game"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  gameserver:
    build:
      context: ./gameserver
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://sao:${POSTGRES_PASSWORD:-sao_dev_password}@postgres:5432/sao_game
      REDIS_URL: redis://redis:6379/0
      HF_ENDPOINT: https://hf-mirror.com
      HF_HOME: /app/data/hf_cache
    ports:
      - "50051:50051"
    volumes:
      - hf_cache:/app/data/hf_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import grpc; ch=grpc.insecure_channel(\"localhost:50051\"); grpc.channel_ready_future(ch).result(timeout=2)'"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 300s
    restart: unless-stopped

  init-demo:
    build:
      context: ./gameserver
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sao_dev_password}
      HF_ENDPOINT: https://hf-mirror.com
    depends_on:
      gameserver:
        condition: service_healthy
    command: ["bash", "scripts/init_demo.sh"]
    restart: "no"

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    environment:
      GATEWAY_CONFIG: config/config.docker.yaml
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      gameserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  hf_cache:
