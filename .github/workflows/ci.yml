name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
    # 跳过纯文档改动的 CI
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'asset/**'
      - '.github/ISSUE_TEMPLATE/**'

env:
  GO_VERSION: '1.26'
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'
  # Opt into Node.js 24 to avoid deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Gateway (Go) - Lint & Test
  gateway-test:
    name: Gateway - Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        cache-dependency-path: gateway/go.sum
    
    - name: Install protoc
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler
        protoc --version
    
    - name: Download dependencies
      run: go mod download
    
    - name: Generate gRPC code
      run: |
        go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
        go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
        cd .. && make proto-go
    
    - name: Run go vet
      run: go vet ./...
    
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        working-directory: gateway
        args: --timeout=5m
      continue-on-error: true
    
    - name: Build
      run: go build -v ./...
    
    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: gateway/coverage.out
        flags: gateway
      continue-on-error: true

  # GameServer (Python) - Lint & Test
  gameserver-test:
    name: GameServer - Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gameserver
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    
    - name: Install dependencies
      run: |
        # Use CPU-only PyTorch to avoid 3GB+ CUDA downloads
        uv sync --frozen \
          --index-url https://download.pytorch.org/whl/cpu \
          --extra-index-url https://pypi.org/simple
    
    - name: Run linting (ruff)
      run: uv run ruff check src/ tests/ || true
      continue-on-error: true
    
    - name: Run type checking
      run: uv run mypy src/ --ignore-missing-imports || true
      continue-on-error: true
    
    - name: Run tests
      run: uv run pytest tests/ -v --tb=short
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: gameserver-test-results
        path: gameserver/tests/

  # Frontend (React) - Lint & Build
  frontend-test:
    name: Frontend - Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linting
      run: npm run lint
      continue-on-error: true
    
    - name: Type check
      run: npx tsc --noEmit
    
    - name: Build
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: frontend/dist/
        retention-days: 7

  # Docker build check
  docker-build:
    name: Docker - Build Check
    runs-on: ubuntu-latest
    needs: [gateway-test, gameserver-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Check Gateway Dockerfile
      run: docker build -t gateway-check ./gateway
      continue-on-error: true
    
    - name: Check GameServer Dockerfile
      run: docker build -t gameserver-check ./gameserver
      continue-on-error: true
    
    - name: Check Frontend Dockerfile
      run: docker build -t frontend-check ./frontend
      continue-on-error: true

  # Integration test (optional)
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [gateway-test, gameserver-test, frontend-test]
    if: github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Create .env file
      run: |
        cat > .env << EOF
        DATABASE_URL=postgresql://sao:sao_dev_password@postgres:5432/sao_game
        REDIS_URL=redis://redis:6379/0
        JWT_SECRET=test-secret-key-for-ci
        OPENAI_API_KEY=sk-test-key-for-ci
        DEEPSEEK_API_KEY=sk-test-key-for-ci
        EOF
    
    - name: Start services
      run: |
        docker compose up -d --build
      continue-on-error: true
    
    - name: Wait for services
      run: sleep 30
      continue-on-error: true
    
    - name: Health check
      run: |
        docker compose ps
        docker compose logs
      continue-on-error: true
    
    - name: Stop services
      if: always()
      run: docker compose down

  # Weekly branch cleanup
  cleanup-branches:
    name: Cleanup Branches
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Clean up branches
      run: |
        chmod +x scripts/clean-branches.sh
        bash scripts/clean-branches.sh --force
      continue-on-error: true
